name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy core/ utils/ models/ scripts/ --ignore-missing-imports

      - name: Test with coverage
        run: pytest --cov=core --cov=utils --cov-report=term-missing
