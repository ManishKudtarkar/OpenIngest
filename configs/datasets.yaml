datasets:

  customers:
    file: customers.csv
    staging_table: stg_customers
    load_strategy: replace

    primary_key:
      - customer_id

    required_columns:
      - customer_id
      - name
      - email
      - country
      - age
      - signup_date

    unique_columns:
      - customer_id

    non_null_columns:
      - customer_id
      - email


  orders:
    file: orders.csv
    staging_table: stg_orders
    load_strategy: replace

    primary_key:
      - order_id

    required_columns:
      - order_id
      - customer_id
      - order_time
      - subtotal_usd
      - total_usd


  products:
    file: products.csv
    staging_table: stg_products
    load_strategy: replace

    primary_key:
      - product_id

    required_columns:
      - product_id
      - category
      - name
      - price_usd
      - cost_usd
      - margin_usd


  sessions:
    file: sessions.csv
    staging_table: stg_sessions
    load_strategy: replace

    primary_key:
      - session_id

    required_columns:
      - session_id
      - customer_id
      - start_time
      - device
      - source
      - country


  employees:
    file: employees.csv
    staging_table: stg_employees
    load_strategy: replace

    primary_key:
      - employee_id

    required_columns:
      - employee_id
      - first_name
      - last_name
      - department
      - email
      - hire_date
      - salary
      - is_active

    unique_columns:
      - employee_id
      - email

    non_null_columns:
      - employee_id
      - email
      - department