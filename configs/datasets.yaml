datasets:

  customers:
    file: customers.csv
    staging_table: stg_customers
    load_strategy: replace

    primary_key:
      - customer_id

    required_columns:
      - customer_id
      - name
      - email
      - country
      - age
      - signup_date

    unique_columns:
      - customer_id

    non_null_columns:
      - customer_id
      - email


  orders:
    file: orders.csv
    staging_table: stg_orders
    load_strategy: incremental
    incremental_column: order_time
    hash_columns:
      - customer_id
      - order_time
      - payment_method
      - discount_pct
      - subtotal_usd
      - total_usd
      - country
      - device
      - source

    primary_key:
      - order_id

    required_columns:
      - order_id
      - customer_id
      - order_time
      - subtotal_usd
      - total_usd


  products:
    file: products.csv
    staging_table: stg_products
    load_strategy: replace

    primary_key:
      - product_id

    required_columns:
      - product_id
      - category
      - name
      - price_usd
      - cost_usd
      - margin_usd


  sessions:
    file: sessions.csv
    staging_table: stg_sessions
    load_strategy: replace

    primary_key:
      - session_id

    required_columns:
      - session_id
      - customer_id
      - start_time
      - device
      - source
      - country


  events:
    file: events.csv
    staging_table: stg_events
    load_strategy: incremental
    incremental_column: timestamp
    hash_columns:
      - session_id
      - event_type
      - product_id
      - amount_usd

    primary_key:
      - event_id

    required_columns:
      - event_id
      - session_id
      - timestamp
      - event_type
      - product_id
      - qty
      - cart_size
      - payment
      - discount_pct
      - amount_usd

    non_null_columns:
      - event_id
      - session_id
      - timestamp
      - event_type


  order_items:
    file: order_items.csv
    staging_table: stg_order_items
    load_strategy: replace

    required_columns:
      - order_id
      - product_id
      - unit_price_usd
      - quantity
      - line_total_usd

    non_null_columns:
      - order_id
      - product_id
      - quantity
      - line_total_usd


  reviews:
    file: reviews.csv
    staging_table: stg_reviews
    load_strategy: incremental
    incremental_column: review_time
    hash_columns:
      - order_id
      - product_id
      - rating

    primary_key:
      - review_id

    required_columns:
      - review_id
      - order_id
      - product_id
      - rating
      - review_text
      - review_time

    non_null_columns:
      - review_id
      - order_id
      - rating


  employees:
    file: employees.csv
    staging_table: stg_employees
    load_strategy: replace

    primary_key:
      - employee_id

    required_columns:
      - employee_id
      - name
      - email
      - department
      - role
      - hire_date
      - salary
      - is_active

    unique_columns:
      - employee_id

    non_null_columns:
      - employee_id
      - email


