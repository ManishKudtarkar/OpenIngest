datasets:
  # ── Arsenal Football Data ──────────────────────────────────────────────────

  goalkeepers:
    file: goalkeepers.csv
    staging_table: stg_goalkeepers
    load_strategy: replace

    source:
      type: s3
      bucket: demos212
      key: goalkeepers.csv
      region: ap-south-1
      aws_access_key_id: ${AWS_ACCESS_KEY_ID}
      aws_secret_access_key: ${AWS_SECRET_ACCESS_KEY}

    required_columns:
      - LastName
      - FirstName
      - Date
      - Pos
      - Min
      - SoTA
      - GA
      - Saves

    non_null_columns:
      - LastName
      - FirstName
      - Date


  players:
    file: players.csv
    staging_table: stg_players
    load_strategy: replace

    source:
      type: s3
      bucket: demos212
      key: players.csv
      region: ap-south-1
      aws_access_key_id: ${AWS_ACCESS_KEY_ID}
      aws_secret_access_key: ${AWS_SECRET_ACCESS_KEY}

    required_columns:
      - LastName
      - FirstName
      - Date
      - Pos
      - Min
      - G
      - A
      - S
      - SoT
      - Touches

    non_null_columns:
      - LastName
      - FirstName
      - Date
      - Pos


  matches:
    file: matches.csv
    staging_table: stg_matches
    load_strategy: replace

    source:
      type: s3
      bucket: demos212
      key: matches.csv
      region: ap-south-1
      aws_access_key_id: ${AWS_ACCESS_KEY_ID}
      aws_secret_access_key: ${AWS_SECRET_ACCESS_KEY}

    required_columns:
      - Season
      - Tour
      - Date
      - Opponent
      - HoAw
      - ArsenalScore
      - OpponentScore

    non_null_columns:
      - Season
      - Date
      - Opponent
      - ArsenalScore
      - OpponentScore


